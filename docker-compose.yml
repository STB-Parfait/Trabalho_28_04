services:
  mysql:
    image: mysql:8.4
    container_name: agenda_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-agenda_db}
      MYSQL_USER: ${DB_USER:-agenda_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-agenda_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: agenda_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${DB_USER:-agenda_user}
      PMA_PASSWORD: ${DB_PASSWORD:-agenda_password}
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    depends_on:
      mysql:
        condition: service_healthy

  app:
    build: .
    container_name: agenda_api
    restart: unless-stopped
    environment:
      APP_PORT: ${APP_PORT:-8000}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-agenda_db}
      DB_USER: ${DB_USER:-agenda_user}
      DB_PASSWORD: ${DB_PASSWORD:-agenda_password}
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
